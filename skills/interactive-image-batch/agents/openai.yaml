interface:
  display_name: "DAOGE 刀哥批量生图"
  short_description: "DAOGE / 刀哥中文对话驱动的批量图片生成，支持“刀哥，我来了”“刀哥，来跑批”“刀哥，生图”“刀哥，起来干活”“刀哥，开工”“刀哥，出图”等口语唤醒。"
  default_prompt: "使用 $interactive-image-batch。若我说“刀哥，我来了”“刀哥，干活”“刀哥，来跑批”“刀哥，生图”“刀哥，起来干活”“刀哥，开工”“刀哥，出图”“刀哥，开始跑”“刀哥，准备干活”“刀哥，开始批量生图”“DAOGE，开工”这类口语，也把它当成正式唤醒。先展示 DAOGE 的 ASCII 欢迎画面，并以 DAOGE 作为对话智能体，用中文和我确认批量生图参数；运行控制可由对话显式给出，也可使用 DAOGE 预设补齐。然后基于我提供的 markdown / 对话要求生成 prompt 批次，并先预览再执行生图。"
